<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flo Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: -apple-system; background:#0f0e17; color:white; padding:15px; }

.card { background:#1a1828; padding:15px; border-radius:15px; margin-bottom:15px; }

.section-label { font-size:11px; color:#7c6f8e; margin-bottom:10px; }

input, textarea {
  width:100%;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
  border:none;
  background:#221f33;
  color:white;
}

.toggle-row {
  padding:10px;
  background:#221f33;
  margin-bottom:6px;
  border-radius:10px;
  cursor:pointer;
}

.toggle-row.on { background:#2c3d2f; }

.scale-row { display:flex; gap:5px; margin-bottom:10px; }

.scale-btn {
  flex:1;
  padding:6px;
  border-radius:8px;
  background:#221f33;
  border:none;
  color:#aaa;
}

.scale-btn.active { background:#a78bfa; color:black; }

button {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#a78bfa;
}

canvas { margin-top:15px; }
</style>
</head>

<body>

<div class="card">
  <div class="section-label">Date</div>
  <input id="datePicker" type="date" onchange="changeDate(this.value)">

  <div class="section-label">Morning Loop</div>
  <div class="toggle-row" onclick="toggleField('morningLoop')">
    Morning loop
  </div>

  <div class="section-label">Energy</div>
  <div class="scale-row" id="energyRow"></div>

  <div class="section-label">Mood</div>
  <div class="scale-row" id="moodRow"></div>

  <div class="section-label">Notes</div>
  <textarea oninput="handleInput('notes', this.value)"></textarea>

  <button onclick="saveDay()">Save</button>
  <button onclick="exportData()">Export</button>
</div>

<div class="card">
  <div class="section-label">Trends</div>
  <canvas id="chart"></canvas>
</div>

<script>

// ─── STATE ─────────────────────
const KEY = "flo-v3";
let DATA = JSON.parse(localStorage.getItem(KEY) || "{}");
let activeDate = new Date().toISOString().split("T")[0];

document.getElementById("datePicker").value = activeDate;

function save() {
  localStorage.setItem(KEY, JSON.stringify(DATA));
}

// ─── HELPERS ─────────────────────
function getDay() {
  if (!DATA[activeDate]) DATA[activeDate] = {};
  return DATA[activeDate];
}

// ─── INPUTS ─────────────────────
function handleInput(field, val) {
  getDay()[field] = val;
  save();
  updateChart();
}

function toggleField(field) {
  const d = getDay();
  d[field] = !d[field];
  render();
  save();
}

function setScale(field, val) {
  const d = getDay();
  d[field] = d[field] === val ? null : val;
  render();
  save();
}

// ─── DATE CHANGE ─────────────────────
function changeDate(val) {
  activeDate = val;
  render();
}

// ─── RENDER UI ─────────────────────
function render() {
  renderScales();
  updateChart();
  updateToggleUI();
}

function renderScales() {
  const e = document.getElementById("energyRow");
  const m = document.getElementById("moodRow");

  e.innerHTML = "";
  m.innerHTML = "";

  const d = getDay();

  for (let i = 1; i <= 5; i++) {
    e.innerHTML += `<button class="scale-btn ${d.energy===i?'active':''}" onclick="setScale('energy',${i})">${i}</button>`;
    m.innerHTML += `<button class="scale-btn ${d.mood===i?'active':''}" onclick="setScale('mood',${i})">${i}</button>`;
  }
}

function updateToggleUI() {
  const el = document.querySelector(".toggle-row");
  const d = getDay();
  if (d.morningLoop) el.classList.add("on");
  else el.classList.remove("on");
}

// ─── SAVE ─────────────────────
function saveDay() {
  save();
  updateChart();
}

// ─── EXPORT ─────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(DATA,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "flo-export.json";
  a.click();
}

// ─── CHART ─────────────────────
let chart;

function updateChart() {
  const labels = Object.keys(DATA).sort();
  const energy = labels.map(d => DATA[d]?.energy || null);
  const mood = labels.map(d => DATA[d]?.mood || null);

  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label:"Energy", data:energy, borderColor:"#a78bfa", tension:0.3 },
        { label:"Mood", data:mood, borderColor:"#6ee7b7", tension:0.3 }
      ]
    }
  });
}

// ─── INIT ─────────────────────
render();
updateChart();

</script>

</body>
</html>
