<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flo Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: -apple-system; background:#0f0e17; color:white; padding:15px; }

.card { background:#1a1828; padding:15px; border-radius:15px; margin-bottom:15px; }

.section-label { font-size:11px; color:#7c6f8e; margin-bottom:10px; }

input, textarea {
  width:100%;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
  border:none;
  background:#221f33;
  color:white;
}

.toggle-row {
  padding:10px;
  background:#221f33;
  margin-bottom:6px;
  border-radius:10px;
  cursor:pointer;
}

.toggle-row.on { background:#2c3d2f; }

.scale-row { display:flex; gap:5px; margin-bottom:10px; }

.scale-btn {
  flex:1;
  padding:6px;
  border-radius:8px;
  background:#221f33;
  border:none;
  color:#aaa;
}

.scale-btn.active { background:#a78bfa; color:black; }

button {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#a78bfa;
}

canvas { margin-top:15px; }
</style>
</head>

<body>

<div class="card">
  <div class="section-label">Date</div>
  <input id="datePicker" type="date" onchange="changeDate(this.value)">

  <div class="section-label">Morning Loop</div>
  <div class="toggle-row" onclick="toggleField('morningLoop')">
    Morning loop
  </div>

  <div class="section-label">Energy</div>
  <div class="scale-row" id="energyRow"></div>

  <div class="section-label">Mood</div>
  <div class="scale-row" id="moodRow"></div>

  <div class="section-label">Notes</div>
  <textarea oninput="handleInput('notes', this.value)"></textarea>

  <button onclick="saveDay()">Save</button>
  <button onclick="exportData()">Export</button>
</div>

<div class="card">
  <div class="section-label">Trends</div>
  <canvas id="chart"></canvas>
</div>

<script>

// ─── State ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'flo-tracker-v1';

function generateDates() {
  const dates = [];
  const start = new Date('2026-04-20');
  const end = new Date('2026-05-04');
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

const ALL_DATES = generateDates();

const SEED = {
  '2026-04-22': { medTime:'05:00', kickTime:'07:00', wearOffTime:'13:00', readyTime:'', morningLoop:true, madebed:false, shower:false, ate:true, clonidine:true, energy:2, mood:2, notes:'Had to be with mom at 6.' },
  '2026-04-23': { medTime:'07:00', kickTime:'09:00', wearOffTime:'15:00', readyTime:'', morningLoop:true, madebed:false, shower:false, ate:true, clonidine:true, energy:2, mood:2, notes:"At mom's." },
  '2026-04-24': { medTime:'08:00', kickTime:'10:00', wearOffTime:'17:00', readyTime:'10:00', morningLoop:true, madebed:false, shower:true, ate:false, clonidine:true, energy:3, mood:2, notes:'Interview day.' }
};

function emptyDay() {
  return {
    medTime:'', kickTime:'', wearOffTime:'', readyTime:'',
    morningLoop:false, madebed:false, shower:false, ate:false, clonidine:false,
    energy:null, mood:null, notes:''
  };
}

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  const saved = raw ? JSON.parse(raw) : {};
  const data = {};
  for (const d of ALL_DATES) {
    data[d] = saved[d] || SEED[d] || emptyDay();
  }
  return data;
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
}

let DATA = loadData();
let activeDate = new Date().toISOString().split('T')[0];

// ─── INPUT HANDLERS (FIXED) ───────────────────────────────────────────────────

function handleInput(field, value) {
  if (!DATA[activeDate]) DATA[activeDate] = emptyDay();
  DATA[activeDate][field] = value;
  saveData();
  buildDateTabs();
}

function toggleField(field, type) {
  if (!DATA[activeDate]) DATA[activeDate] = emptyDay();
  DATA[activeDate][field] = !DATA[activeDate][field];
  renderDay();
  saveData();
}

function setScale(field, val) {
  if (!DATA[activeDate]) DATA[activeDate] = emptyDay();
  DATA[activeDate][field] = DATA[activeDate][field] === val ? null : val;
  renderDay();
  saveData();
}

// ─── UI FIXES ────────────────────────────────────────────────────────────────

function renderDay() {
  const day = DATA[activeDate] || emptyDay();

  document.getElementById('f-medTime').value = day.medTime;
  document.getElementById('f-kickTime').value = day.kickTime;
  document.getElementById('f-wearOffTime').value = day.wearOffTime;
  document.getElementById('f-readyTime').value = day.readyTime;
  document.getElementById('f-notes').value = day.notes;

  renderToggle('morningLoop', day.morningLoop, 'bad');
  renderToggle('madebed', day.madebed, 'good');
  renderToggle('shower', day.shower, 'good');
  renderToggle('ate', day.ate, 'good');
  renderToggle('clonidine', day.clonidine, 'neutral');

  renderScale('energy', day.energy);
  renderScale('mood', day.mood);

  renderPatterns();
}

function renderToggle(field, value, type) {
  const el = document.getElementById('t-' + field);
  el.className = 'toggle-row' + (value ? ` on-${type}` : '');
}

function renderScale(field, value) {
  const container = document.getElementById('scale-' + field);
  if (!container) return;
  container.querySelectorAll('.scale-btn').forEach((btn, i) => {
    btn.className = 'scale-btn' + (value === i+1 ? ` active-${i+1}` : '');
  });
}

// ─── SAVE + EXPORT (FIXED) ───────────────────────────────────────────────────

function saveDay() {
  saveData();
  alert("Saved ✔");
}

function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "flo-data.json";
  a.click();
}

// ─── DATE TABS ───────────────────────────────────────────────────────────────

function buildDateTabs() {
  const wrap = document.getElementById('dateScroll');
  wrap.innerHTML = '';

  for (const d of ALL_DATES) {
    const btn = document.createElement('button');
    btn.className = 'date-btn' + (d === activeDate ? ' active' : '');
    btn.textContent = d.split('-')[2];
    btn.onclick = () => {
      activeDate = d;
      renderDay();
      buildDateTabs();
    };
    wrap.appendChild(btn);
  }
}

// ─── PATTERNS ────────────────────────────────────────────────────────────────

function renderPatterns() {
  const wrap = document.getElementById('patternRows');
  wrap.innerHTML = '';

  const keys = [
    { label:'Morning loop', key:'morningLoop' },
    { label:'Made bed', key:'madebed' },
    { label:'Ate breakfast', key:'ate' }
  ];

  for (const k of keys) {
    const row = document.createElement('div');
    row.className = 'pattern-row';
    row.innerHTML = `<div class="pattern-label">${k.label}</div>`;
    wrap.appendChild(row);
  }
}

// ─── INIT ───────────────────────────────────────────────────────────────────

buildDateTabs();
renderDay();
</script>

</body>
</html>
