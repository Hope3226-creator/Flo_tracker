<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flo Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #0f0e17;
  color: #eee;
  padding: 20px;
}

.card {
  background: #1a1828;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

.section-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: #7c6f8e;
  margin-bottom: 10px;
}

.toggle-row {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#221f33;
  margin-bottom:6px;
  border-radius:10px;
  cursor:pointer;
}

.toggle-row.on { background:#2c3d2f; }

.scale-row { display:flex; gap:5px; }

.scale-btn {
  flex:1;
  padding:6px;
  background:#221f33;
  border:none;
  color:#aaa;
  border-radius:8px;
}

.scale-btn.active {
  background:#a78bfa;
  color:black;
}

textarea {
  width:100%;
  height:80px;
  background:#221f33;
  border:none;
  color:white;
  padding:10px;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#a78bfa;
}

canvas { margin-top:15px; }
</style>
</head>

<body>

<div class="card">
  <div class="section-label">Morning Loop</div>
  <div class="toggle-row" onclick="toggleField('morningLoop')">
    Morning loop stuck
  </div>

  <div class="section-label">Energy</div>
  <div class="scale-row" id="energyRow"></div>

  <div class="section-label">Mood</div>
  <div class="scale-row" id="moodRow"></div>

  <div class="section-label">Notes</div>
  <textarea oninput="handleInput('notes', this.value)"></textarea>

  <button onclick="saveDay()">Save</button>
  <button onclick="exportData()">Export</button>
</div>

<div class="card">
  <div class="section-label">Trends</div>
  <canvas id="chart"></canvas>
</div>

<script>
// ─── STATE ─────────────────────────
const KEY = "flo-v2";
let DATA = JSON.parse(localStorage.getItem(KEY) || "{}");
let activeDate = new Date().toISOString().split("T")[0];

function save() {
  localStorage.setItem(KEY, JSON.stringify(DATA));
}

// ─── INPUT ─────────────────────────
function handleInput(field, val) {
  if (!DATA[activeDate]) DATA[activeDate] = {};
  DATA[activeDate][field] = val;
  save();
  updateChart();
}

function toggleField(field) {
  if (!DATA[activeDate]) DATA[activeDate] = {};
  DATA[activeDate][field] = !DATA[activeDate][field];
  render();
  save();
}

function setScale(field, val) {
  if (!DATA[activeDate]) DATA[activeDate] = {};
  DATA[activeDate][field] =
    DATA[activeDate][field] === val ? null : val;
  render();
  save();
}

// ─── RENDER SCALES ─────────────────────────
function renderScales() {
  const energy = document.getElementById("energyRow");
  const mood = document.getElementById("moodRow");

  energy.innerHTML = "";
  mood.innerHTML = "";

  for (let i = 1; i <= 5; i++) {
    energy.innerHTML += `<button class="scale-btn ${DATA[activeDate]?.energy===i?'active':''}" onclick="setScale('energy',${i})">${i}</button>`;
    mood.innerHTML += `<button class="scale-btn ${DATA[activeDate]?.mood===i?'active':''}" onclick="setScale('mood',${i})">${i}</button>`;
  }
}

// ─── RENDER ─────────────────────────
function render() {
  renderScales();
  updateChart();
}

// ─── SAVE DAY ─────────────────────────
function saveDay() {
  save();
  updateChart();
}

// ─── EXPORT ─────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(DATA,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "flo-export.json";
  a.click();
}

// ─── CHART ─────────────────────────
let chart;

function updateChart() {
  const labels = Object.keys(DATA).sort();
  const energy = labels.map(d => DATA[d]?.energy || null);
  const mood = labels.map(d => DATA[d]?.mood || null);

  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "Energy",
          data: energy,
          borderColor: "#a78bfa",
          tension: 0.3
        },
        {
          label: "Mood",
          data: mood,
          borderColor: "#6ee7b7",
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true
    }
  });
}

// ─── INIT ─────────────────────────
render();
updateChart();
</script>

</body>
</html>
