<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flo Tracker">
<title>Flo Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0f0e17;
  --surface: #1a1828;
  --surface2: #221f33;
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.15);
  --green: #6ee7b7;
  --red: #f87171;
  --yellow: #fcd34d;
  --text: #ede9f0;
  --muted: #7c6f8e;
  --border: rgba(167,139,250,0.15);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'SF Pro Text', Georgia, serif;
  padding-bottom: 40px;
}

.header {
  padding: 50px 20px 20px;
  text-align: center;
}

.card {
  background: var(--surface);
  border-radius: 20px;
  border: 1px solid var(--border);
  padding: 16px;
  margin: 12px;
}

.section-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 12px;
}

.toggle-row {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: var(--surface2);
  margin-bottom: 6px;
  border-radius: 10px;
  cursor: pointer;
}

.toggle-row.on-good { background: rgba(110,231,183,0.15); }
.toggle-row.on-bad { background: rgba(248,113,113,0.15); }
.toggle-row.on-neutral { background: rgba(252,211,77,0.15); }

.toggle-switch {
  width: 36px;
  height: 18px;
  border-radius: 10px;
  background: #444;
  display: flex;
  align-items: center;
  padding: 2px;
}

.toggle-knob {
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
}

.scale-row { display: flex; gap: 6px; }

.scale-btn {
  flex: 1;
  padding: 6px;
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--muted);
}

.scale-btn.active-1 { background: rgba(248,113,113,0.3); }
.scale-btn.active-2 { background: rgba(251,146,60,0.3); }
.scale-btn.active-3 { background: rgba(252,211,77,0.3); }
.scale-btn.active-4 { background: rgba(110,231,183,0.3); }
.scale-btn.active-5 { background: rgba(167,139,250,0.3); }

textarea {
  width: 100%;
  padding: 10px;
  background: var(--surface2);
  border-radius: 10px;
  color: var(--text);
}

.save-btn {
  width: 94%;
  margin: 12px;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--purple);
  background: var(--purple-dim);
  color: var(--purple);
}

canvas { margin-top: 10px; }
</style>
</head>

<body>

<div class="header">
  <h2>Flo Tracker 🌸</h2>
</div>

<div class="card">
  <div class="section-label">Energy Trend</div>
  <canvas id="energyChart"></canvas>
</div>

<div class="card">
  <div class="section-label">Notes</div>
  <textarea id="f-notes" oninput="handleInput('notes', this.value)"></textarea>
</div>

<button class="save-btn" onclick="saveDay()">Save</button>

<script>
// ─── DATA ─────────────────────
const STORAGE_KEY = "flo-tracker-v1";

const DATA = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

let activeDate = new Date().toISOString().split("T")[0];

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
}

// ─── INPUT HANDLERS ─────────────────────
function handleInput(field, value) {
  if (!DATA[activeDate]) DATA[activeDate] = {};
  DATA[activeDate][field] = value;
  saveData();
}

// ─── SCALE + TOGGLES ─────────────────────
function setScale(field, val) {
  if (!DATA[activeDate]) DATA[activeDate] = {};
  DATA[activeDate][field] = val;
  saveData();
}

function toggleField(field) {
  if (!DATA[activeDate]) DATA[activeDate] = {};
  DATA[activeDate][field] = !DATA[activeDate][field];
  saveData();
}

// ─── CHART ─────────────────────
const ctx = document.getElementById("energyChart");

function buildChart() {
  const labels = Object.keys(DATA).sort();
  const values = labels.map(d => DATA[d]?.energy || 0);

  new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Energy",
        data: values,
        borderColor: "#a78bfa",
        tension: 0.3
      }]
    }
  });
}

// ─── SAVE ─────────────────────
function saveDay() {
  saveData();
  buildChart();
  alert("Saved!");
}

// ─── INIT ─────────────────────
buildChart();
</script>

</body>
</html>
